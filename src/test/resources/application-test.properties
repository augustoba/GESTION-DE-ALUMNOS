# Base de datos en memoria para tests (no toca MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea el schema desde las entidades y lo borra al terminar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deshabilita el envio de emails en tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# JWT (misma clave que produccion)
jwt.secret=3A7F2E9B4C1D6F0A8E5B3D7C2F4A9E1B6D3F7C0A4E8B2D5F1C9A3E6B0D4F7A2
jwt.expiration=900000

# Config de mail (no se usa por el exclude, pero evita errores de binding)
spring.mail.host=localhost
spring.mail.port=25
mail.from=test@test.com
mail.institucion=Test
